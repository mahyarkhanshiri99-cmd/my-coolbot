<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Net - Next-Gen Content Delivery Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Plus Jakarta Sans', sans-serif; } </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between overflow-x-hidden">

    <header class="border-b border-slate-900 bg-slate-950/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 font-extrabold text-xl bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                <span>🌐</span> StellarNet
            </div>
            <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-slate-400">
                <a href="#" class="hover:text-white transition">Network</a>
                <a href="#" class="hover:text-white transition">Solutions</a>
                <a href="#" class="hover:text-white transition">Pricing</a>
            </nav>
            <button class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
                Client Portal
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 text-center py-24 relative flex-1 flex flex-col justify-center">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-blue-500/10 blur-[120px] rounded-full pointer-events-none"></div>
        
        <span class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-xs font-medium bg-blue-500/10 text-blue-400 border border-blue-500/20 mb-6 mx-auto">
            <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> Global Edge Network: Active
        </span>
        
        <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight mb-6 bg-gradient-to-b from-white to-slate-400 bg-clip-text text-transparent">
            Accelerate Your Digital <br>Experience Everywhere.
        </h1>
        
        <p class="text-slate-400 text-lg max-w-2xl mx-auto mb-10 leading-relaxed">
            High-performance content delivery network designed for secure, low-latency data routing and global edge acceleration.
        </p>
        
        <div class="flex items-center justify-center gap-4">
            <button class="bg-white text-slate-950 px-6 py-3 rounded-xl font-bold hover:bg-slate-200 transition">Get Started</button>
            <button class="bg-slate-900 text-slate-200 px-6 py-3 rounded-xl font-bold border border-slate-800 hover:bg-slate-800 transition">View Nodes</button>
        </div>
    </main>

    <footer class="border-t border-slate-900 py-6 text-center text-sm text-slate-600">
        <p>&copy; 2026 StellarNet Services Inc. All rights reserved.</p>
    </footer>

</body>
</html>
